<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChronoProtein — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/design-system.css">
<style>
  .lang-toggle {
    position: fixed; top: 16px; right: 16px; z-index: 100;
    display: flex; border-radius: 100px; overflow: hidden;
    border: 1px solid var(--border); background: var(--card);
  }
  .lang-toggle button {
    padding: 6px 14px; font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.1em; border: none; background: transparent;
    color: var(--muted); cursor: pointer; transition: all 0.2s;
  }
  .lang-toggle button.active { background: var(--green); color: var(--dark); font-weight: 600; }

  .back-home {
    position: fixed; top: 16px; left: 16px; z-index: 100;
    padding: 6px 14px; font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.1em; border: 1px solid var(--border);
    border-radius: var(--radius-pill); background: var(--card);
    color: var(--muted); text-decoration: none; transition: all 0.2s;
  }
  .back-home:hover { color: var(--text); border-color: var(--sub); }

  .admin-container {
    max-width: 900px;
    margin: 0 auto;
    padding: 80px 20px 60px;
  }

  .admin-header {
    margin-bottom: 32px;
  }

  .admin-header h1 {
    font-size: clamp(32px, 6vw, 52px);
    margin-bottom: 8px;
  }

  .admin-header p {
    color: var(--sub);
    font-size: 14px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
  }

  .stat-card .value {
    font-family: var(--font-display);
    font-size: 36px;
    color: var(--green);
  }

  .stat-card .label {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--font-mono);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .section-label {
    font-family: var(--font-display);
    font-size: 28px;
    letter-spacing: 0.03em;
    color: var(--text);
    margin-bottom: 16px;
  }

  .user-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }

  .user-table th {
    text-align: left;
    padding: 12px 16px;
    font-size: 11px;
    font-family: var(--font-mono);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--card-alt);
    border-bottom: 1px solid var(--border);
  }

  .user-table td {
    padding: 12px 16px;
    font-size: 13px;
    color: var(--sub);
    border-bottom: 1px solid var(--border);
  }

  .user-table tr:last-child td {
    border-bottom: none;
  }

  .user-table tr:hover td {
    background: rgba(0,194,124,0.04);
  }

  .access-denied {
    text-align: center;
    padding: 80px 20px;
  }

  .access-denied h2 {
    font-size: 36px;
    margin-bottom: 12px;
    color: var(--red);
  }

  .access-denied p {
    color: var(--muted);
    margin-bottom: 24px;
  }

  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 14px;
  }

  .feedback-controls {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .feedback-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px 20px;
    margin-bottom: 10px;
  }

  .feedback-card .fb-meta {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }

  .fb-type-badge {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: var(--radius-pill);
    font-weight: 600;
  }

  .fb-type-badge.bug { background: rgba(255,59,47,0.15); color: var(--red); }
  .fb-type-badge.improvement { background: rgba(255,172,10,0.15); color: var(--amber); }
  .fb-type-badge.positive { background: rgba(0,194,124,0.15); color: var(--green); }

  .fb-page { font-size: 11px; color: var(--muted); font-family: var(--font-mono); }
  .fb-date { font-size: 11px; color: var(--muted); }
  .fb-user { font-size: 12px; color: var(--sub); }

  .feedback-card .fb-message {
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
  }

  .md-output {
    display: none;
    margin-top: 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--sub);
    white-space: pre-wrap;
    max-height: 400px;
    overflow-y: auto;
  }

  .copy-toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--green);
    color: var(--dark);
    padding: 10px 24px;
    border-radius: var(--radius-pill);
    font-size: 13px;
    font-weight: 600;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .copy-toast.show { opacity: 1; }
</style>
</head>
<body>

<a href="index.html" class="back-home" data-i18n="backHome">← Home</a>

<div class="lang-toggle">
  <button class="active" data-lang="en" onclick="switchLang('en')">EN</button>
  <button data-lang="es" onclick="switchLang('es')">ES</button>
</div>

<div class="admin-container">

  <!-- Loading state -->
  <div id="loading" class="loading">
    <p data-i18n="adminLoading">Loading...</p>
  </div>

  <!-- Access denied -->
  <div id="access-denied" class="access-denied" style="display:none">
    <h2>⛔</h2>
    <p data-i18n="adminNoAccess">Access denied. Admin privileges required.</p>
    <a href="index.html" class="btn btn-secondary" data-i18n="backHome">← Home</a>
  </div>

  <!-- Admin panel -->
  <div id="admin-panel" style="display:none">

    <div class="admin-header">
      <h1><span class="gradient-warm" data-i18n="adminPanel">ADMIN PANEL</span></h1>
      <p data-i18n="adminDesc">Manage users and view registered profiles</p>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="value" id="stat-total">0</div>
        <div class="label" data-i18n="totalUsers">Total Users</div>
      </div>
      <div class="stat-card">
        <div class="value" id="stat-recent">0</div>
        <div class="label" data-i18n="recentSignups">Recent Signups (7d)</div>
      </div>
    </div>

    <!-- User list -->
    <div class="section-label" data-i18n="adminUserList">REGISTERED USERS</div>
    <table class="user-table">
      <thead>
        <tr>
          <th data-i18n="adminEmail">Email</th>
          <th data-i18n="adminCreated">Created</th>
          <th data-i18n="adminWeight">Weight</th>
          <th data-i18n="adminChronotype">Chronotype</th>
          <th data-i18n="adminGoal">Goal</th>
        </tr>
      </thead>
      <tbody id="user-tbody"></tbody>
    </table>

    <!-- Feedback section -->
    <div style="margin-top:40px">
      <div class="section-label">FEEDBACK</div>
      <div class="feedback-controls">
        <button class="btn btn-primary" onclick="copyFeedbackMd()">Copy as Markdown</button>
        <button class="btn btn-secondary" onclick="downloadFeedbackMd()">Download .md</button>
        <button class="btn btn-secondary" onclick="toggleMdPreview()">Preview Markdown</button>
      </div>
      <div id="feedback-list"></div>
      <div id="md-output" class="md-output"></div>
    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/i18n.js"></script>
<script src="js/supabase-client.js"></script>
<script>
  async function initAdmin() {
    const loading = document.getElementById('loading');
    const denied = document.getElementById('access-denied');
    const panel = document.getElementById('admin-panel');

    try {
      const session = await Auth.getSession();
      if (!session) {
        window.location.href = 'auth.html';
        return;
      }

      const isAdmin = await Admin.isAdmin();
      if (!isAdmin) {
        loading.style.display = 'none';
        denied.style.display = 'block';
        return;
      }

      // Load profiles
      const profiles = await Admin.listProfiles();

      // Stats
      document.getElementById('stat-total').textContent = profiles.length;
      const weekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);
      const recent = profiles.filter(p => new Date(p.created_at) > weekAgo).length;
      document.getElementById('stat-recent').textContent = recent;

      // Table
      const tbody = document.getElementById('user-tbody');
      tbody.innerHTML = profiles.map(p => `
        <tr>
          <td>${escapeHtml(p.id)}</td>
          <td>${p.created_at ? new Date(p.created_at).toLocaleDateString() : '—'}</td>
          <td>${p.weight_kg ? p.weight_kg + ' kg' : '—'}</td>
          <td>${p.chronotype || '—'}</td>
          <td>${p.goal || '—'}</td>
        </tr>
      `).join('');

      // Load feedback
      await loadFeedback();

      loading.style.display = 'none';
      panel.style.display = 'block';

    } catch (err) {
      loading.style.display = 'none';
      denied.style.display = 'block';
      console.error('Admin init error:', err);
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // Language
  function switchLang(lang) {
    I18n.setLang(lang);
    document.querySelectorAll('.lang-toggle button').forEach(b => {
      b.classList.toggle('active', b.dataset.lang === lang);
    });
    document.querySelectorAll('[data-i18n]').forEach(el => {
      el.textContent = i18n(el.dataset.i18n);
    });
  }

  (function() {
    const lang = I18n.getLang();
    document.querySelectorAll('.lang-toggle button').forEach(b => {
      b.classList.toggle('active', b.dataset.lang === lang);
    });
    if (lang !== 'en') {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        el.textContent = i18n(el.dataset.i18n);
      });
    }
  })();

  let feedbackData = [];

  async function loadFeedback() {
    const { data, error } = await sb.from('feedback')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) {
      console.warn('Could not load feedback:', error.message);
      return;
    }

    feedbackData = data || [];
    const container = document.getElementById('feedback-list');

    if (feedbackData.length === 0) {
      container.innerHTML = '<p style="color:var(--muted);font-size:13px">No feedback entries yet.</p>';
      return;
    }

    container.innerHTML = feedbackData.map(f => `
      <div class="feedback-card">
        <div class="fb-meta">
          <span class="fb-type-badge ${f.type}">${f.type}</span>
          <span class="fb-page">${escapeHtml(f.page)}</span>
          <span class="fb-date">${new Date(f.created_at).toLocaleString()}</span>
          ${f.user_name ? `<span class="fb-user">${escapeHtml(f.user_name)}</span>` : ''}
          ${f.user_email ? `<span class="fb-user">(${escapeHtml(f.user_email)})</span>` : ''}
        </div>
        <div class="fb-message">${escapeHtml(f.message)}</div>
      </div>
    `).join('');
  }

  function feedbackToMd() {
    const now = new Date().toISOString().split('T')[0];
    let md = `# ChronoProtein Feedback Report\n`;
    md += `> Exported: ${now} | Total entries: ${feedbackData.length}\n\n`;
    md += `---\n\n`;

    feedbackData.forEach((f, i) => {
      const date = new Date(f.created_at).toLocaleString();
      const user = [f.user_name, f.user_email].filter(Boolean).join(' — ') || 'Anonymous';
      md += `## ${i + 1}. [${f.type.toUpperCase()}] ${f.page}\n\n`;
      md += `- **Date:** ${date}\n`;
      md += `- **User:** ${user}\n`;
      md += `- **Type:** ${f.type}\n`;
      md += `- **Page:** ${f.page}\n\n`;
      md += `**Message:**\n> ${f.message}\n\n`;
      md += `---\n\n`;
    });

    return md;
  }

  function copyFeedbackMd() {
    const md = feedbackToMd();
    navigator.clipboard.writeText(md).then(() => {
      showToast('Markdown copied to clipboard!');
    });
  }

  function downloadFeedbackMd() {
    const md = feedbackToMd();
    const blob = new Blob([md], { type: 'text/markdown' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `feedback-${new Date().toISOString().split('T')[0]}.md`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function toggleMdPreview() {
    const el = document.getElementById('md-output');
    if (el.style.display === 'block') {
      el.style.display = 'none';
    } else {
      el.textContent = feedbackToMd();
      el.style.display = 'block';
    }
  }

  function showToast(msg) {
    let toast = document.querySelector('.copy-toast');
    if (!toast) {
      toast = document.createElement('div');
      toast.className = 'copy-toast';
      document.body.appendChild(toast);
    }
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  initAdmin();
</script>
</body>
</html>
