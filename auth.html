<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChronoProtein — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/design-system.css">
<style>
  .lang-toggle {
    position: fixed; top: 16px; right: 16px; z-index: 100;
    display: flex; border-radius: 100px; overflow: hidden;
    border: 1px solid var(--border); background: var(--card);
  }
  .lang-toggle button {
    padding: 6px 14px; font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.1em; border: none; background: transparent;
    color: var(--muted); cursor: pointer; transition: all 0.2s;
  }
  .lang-toggle button.active { background: var(--green); color: var(--dark); font-weight: 600; }

  .auth-container {
    max-width: 420px;
    margin: 0 auto;
    padding: 80px 20px 60px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .auth-header {
    text-align: center;
    margin-bottom: 40px;
  }

  .auth-header h1 {
    font-size: clamp(36px, 6vw, 52px);
    margin-bottom: 8px;
  }

  .auth-header p {
    color: var(--sub);
    font-size: 14px;
  }

  .auth-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 32px 24px;
  }

  .auth-tabs {
    display: flex;
    border-radius: var(--radius-pill);
    overflow: hidden;
    border: 1px solid var(--border);
    margin-bottom: 24px;
  }

  .auth-tabs button {
    flex: 1;
    padding: 10px 16px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    border: none;
    background: transparent;
    color: var(--sub);
    cursor: pointer;
    transition: all var(--duration) var(--ease-out);
  }

  .auth-tabs button.active {
    background: var(--green);
    color: var(--dark);
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-group label {
    display: block;
    font-size: 12px;
    font-family: var(--font-mono);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .form-group input {
    width: 100%;
    padding: 12px 14px;
    background: var(--dark);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    transition: border-color var(--duration);
  }

  .form-group input:focus {
    outline: none;
    border-color: var(--green);
  }

  .auth-submit {
    width: 100%;
    margin-top: 8px;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
    color: var(--muted);
    font-size: 12px;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .google-btn {
    width: 100%;
    padding: 12px 24px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    background: var(--card-alt);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all var(--duration) var(--ease-out);
  }

  .google-btn:hover {
    border-color: var(--sub);
    background: var(--dark);
  }

  .google-btn svg {
    width: 18px;
    height: 18px;
  }

  .guest-link {
    display: block;
    text-align: center;
    margin-top: 20px;
    color: var(--muted);
    font-size: 13px;
    text-decoration: none;
    transition: color var(--duration);
  }

  .guest-link:hover {
    color: var(--sub);
  }

  .auth-message {
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }

  .auth-message.error {
    background: rgba(255,59,47,0.1);
    border: 1px solid rgba(255,59,47,0.3);
    color: #FF6B60;
    display: block;
  }

  .auth-message.success {
    background: rgba(0,194,124,0.1);
    border: 1px solid rgba(0,194,124,0.3);
    color: var(--green);
    display: block;
  }

  .back-home {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 100;
    padding: 6px 14px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    border: 1px solid var(--border);
    border-radius: var(--radius-pill);
    background: var(--card);
    color: var(--muted);
    text-decoration: none;
    transition: all 0.2s;
  }

  .back-home:hover {
    color: var(--text);
    border-color: var(--sub);
  }
</style>
</head>
<body>

<a href="index.html" class="back-home" data-i18n="backHome">← Home</a>

<div class="lang-toggle">
  <button class="active" data-lang="en" onclick="switchLang('en')">EN</button>
  <button data-lang="es" onclick="switchLang('es')">ES</button>
</div>

<div class="auth-container">

  <div class="auth-header">
    <h1>
      <span class="gradient-warm">CHRONO</span><br>
      <span class="gradient-cool">PROTEIN</span>
    </h1>
    <p data-i18n="authSubtitle">Sign in to save your plan and access it from any device</p>
  </div>

  <div class="auth-card">
    <!-- Tabs: Sign In / Sign Up -->
    <div class="auth-tabs">
      <button class="active" id="tab-signin" onclick="switchTab('signin')" data-i18n="signIn">Sign In</button>
      <button id="tab-signup" onclick="switchTab('signup')" data-i18n="signUp">Sign Up</button>
    </div>

    <!-- Message area -->
    <div id="auth-message" class="auth-message"></div>

    <!-- Email form -->
    <form id="auth-form" onsubmit="handleSubmit(event)">
      <div class="form-group">
        <label data-i18n="emailLabel">Email</label>
        <input type="email" id="auth-email" required placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label data-i18n="passwordLabel">Password</label>
        <input type="password" id="auth-password" required placeholder="••••••••" minlength="6">
      </div>
      <button type="submit" class="btn btn-primary btn-lg auth-submit" id="auth-submit-btn" data-i18n="signIn">Sign In</button>
    </form>

    <!-- Divider -->
    <div class="divider" data-i18n="orContinueWith">or continue with</div>

    <!-- Google OAuth -->
    <button class="google-btn" onclick="handleGoogle()" id="google-btn">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      <span data-i18n="continueWithGoogle">Continue with Google</span>
    </button>

    <!-- Guest mode -->
    <a href="onboarding.html" class="guest-link" data-i18n="continueAsGuest">Continue as guest (no account needed)</a>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/i18n.js"></script>
<script src="js/supabase-client.js"></script>
<script>
  let currentTab = 'signin';

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tab-signin').classList.toggle('active', tab === 'signin');
    document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
    document.getElementById('auth-submit-btn').textContent =
      tab === 'signin' ? i18n('signIn') : i18n('signUp');
    hideMessage();
  }

  function showMessage(text, type) {
    const el = document.getElementById('auth-message');
    el.textContent = text;
    el.className = 'auth-message ' + type;
  }

  function hideMessage() {
    const el = document.getElementById('auth-message');
    el.className = 'auth-message';
  }

  async function handleSubmit(e) {
    e.preventDefault();
    const email = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value;
    const btn = document.getElementById('auth-submit-btn');

    btn.disabled = true;
    btn.textContent = '...';
    hideMessage();

    try {
      if (currentTab === 'signup') {
        await Auth.signUp(email, password);
        showMessage(i18n('checkEmail'), 'success');
        btn.disabled = false;
        btn.textContent = i18n('signUp');
      } else {
        await Auth.signIn(email, password);
        // Check if user has a profile — redirect accordingly
        const profile = await Profiles.load();
        if (profile) {
          window.location.href = 'dashboard.html';
        } else {
          window.location.href = 'onboarding.html';
        }
      }
    } catch (err) {
      showMessage(err.message, 'error');
      btn.disabled = false;
      btn.textContent = currentTab === 'signin' ? i18n('signIn') : i18n('signUp');
    }
  }

  async function handleGoogle() {
    try {
      await Auth.signInWithGoogle();
    } catch (err) {
      showMessage(err.message, 'error');
    }
  }

  // If already logged in, redirect
  (async function checkSession() {
    try {
      const session = await Auth.getSession();
      if (session) {
        const profile = await Profiles.load();
        window.location.href = profile ? 'dashboard.html' : 'onboarding.html';
      }
    } catch (e) {
      // Not logged in — stay on auth page
    }
  })();

  // Language
  function switchLang(lang) {
    I18n.setLang(lang);
    document.querySelectorAll('.lang-toggle button').forEach(b => {
      b.classList.toggle('active', b.dataset.lang === lang);
    });
    applyTranslations();
    // Update tab button text
    document.getElementById('auth-submit-btn').textContent =
      currentTab === 'signin' ? i18n('signIn') : i18n('signUp');
  }

  function applyTranslations() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
      el.textContent = i18n(el.dataset.i18n);
    });
  }

  (function() {
    const lang = I18n.getLang();
    document.querySelectorAll('.lang-toggle button').forEach(b => {
      b.classList.toggle('active', b.dataset.lang === lang);
    });
    if (lang !== 'en') applyTranslations();
  })();
</script>
</body>
</html>
